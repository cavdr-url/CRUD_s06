<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel de Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-semibold" th:href="@{/usuario/inicio}">Mis Recursos</a>
      <div class="d-flex gap-2">
        <form th:action="@{/logout}" method="post">
          <button class="btn btn-outline-secondary" type="submit">Cerrar sesión</button>
        </form>
      </div>
    </div>
  </nav>

  <header class="py-4 page-hero">
    <div class="container">
      <div class="d-flex flex-wrap align-items-end justify-content-between gap-2">
        <div>
          <div class="pill">Panel de Usuario</div>
          <h1 class="h3 fw-bold mt-2 mb-1">Mis Recursos</h1>
          <div class="text-muted">Bienvenido, <span sec:authentication="name"></span></div>
        </div>
      </div>
    </div>
  </header>

  <main class="container pb-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Tipo</th>
                <th>URL</th>
                <th>Disponible</th>
                <th>Docente</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(resources)}">
                <td colspan="6" class="text-muted">No hay recursos disponibles.</td>
              </tr>
              <tr th:each="r : ${resources}">
                <td th:text="${r.id}">1</td>
                <td class="fw-semibold" th:text="${r.title}">Título</td>
                <td th:text="${r.type}">Tipo</td>
                <td>
                  <a th:href="${r.url}" th:text="${r.url}" target="_blank" rel="noreferrer">https://</a>
                </td>
                <td>
                  <span th:if="${r.available}" class="badge bg-success">Sí</span>
                  <span th:unless="${r.available}" class="badge bg-danger">No</span>
                </td>
                <td th:text="${r.teacherName}">Docente</td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <div class="alert alert-light border mt-3">
          <div class="fw-semibold">Nota</div>
          <div class="small text-muted">Solo lectura. Contacta al administrador para realizar cambios.</div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
